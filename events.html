<!DOCTYPE html>
<html>
<head>
  <title>Games - Blox Fruit Levi Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    :root {
      --bg-start: #1f1c2c;
      --bg-end: #928dab;
      --text: white;
      --accent: #ffcc33;
    }

    body.light {
      --bg-start: #f0eafc;
      --bg-end: #d0c7f0;
      --text: #111;
      --accent: #ff9900;
    }

    * { box-sizing: border-box; margin:0; padding:0; font-family:'Roboto',sans-serif; }

    body {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background: linear-gradient(135deg,var(--bg-start),var(--bg-end));
      color: var(--text);
      transition:0.5s;
    }

    header, footer {
      position: fixed;
      width:100%;
      backdrop-filter:blur(12px);
      background: rgba(0,0,0,0.3);
      color:var(--text);
      z-index:1000;
      padding:15px 30px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    header .title { 
      margin-left: 50%; 
      transform: translateX(-50%); 
      font-weight:bold; 
      font-size:clamp(18px,2vw,26px); 
    }

    header .nav a {
      margin-left: 25px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    header .nav a:hover { text-decoration: underline; }

    footer { bottom:0; text-align:center; font-size:14px; }

    main {
      margin-top:100px;
      padding: 20px 40px;
      flex:1;
      max-width:700px;
      margin-left:auto;
      margin-right:auto;
      text-align:center;
    }

    h1 {
      margin-bottom:30px;
      font-size:clamp(32px,5vw,50px);
      text-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .game-card {
      padding:30px 20px;
      background: rgba(0,0,0,0.25);
      border-radius:12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-size:20px;
      line-height:1.8;
      color: var(--text);
      margin-bottom:20px;
    }

    .game-card h2 {
      font-size:clamp(24px,4vw,32px);
      margin-bottom:15px;
      color: var(--accent);
    }

    .event-time {
      margin-top:15px;
      font-size:18px;
      font-weight:bold;
      color:#ff4444;
    }
  </style>
</head>

<body>

<header>
  <div class="title">🎮 Gaming Community Server</div>
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="events.html">Events</a>
    <a href="staff.html">Staff</a>
    <a href="rules.html">Rules</a>
  </div>
</header>

<main>
  <h1>Upcoming Event</h1>

  <div class="game-card">
    <h2>Blox Fruit – Levi Hunt</h2>
    <p>⚔️ Get ready for the epic <strong>Levi Hunt</strong> event in Blox Fruit! Join fellow players to battle mighty Leviathan!!
    <div class="event-time">🗓️ Event: 11th Saturday, 5:00 PM IST</div>
  </div>

</main>

<footer>
  © 2026 All Rights Reserved by EzGamer
</footer>

</body>
</html>
