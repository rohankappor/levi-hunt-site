<!DOCTYPE html>
<html>
<head>
  <title>Gaming Community Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    :root {
      --bg-start: #0f2027;
      --bg-end: #2c5364;
      --text: white;
      --accent: #00ffe0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      padding: 90px 20px 70px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.5s;
    }

    body.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 20px;
      backdrop-filter: blur(15px);
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      background: var(--accent);
      color: black;
      box-shadow: 0 0 10px var(--accent);
    }

    /* MAIN */
    h1 {
      font-size: clamp(28px, 6vw, 60px);
      text-align: center;
      margin-bottom: 30px;
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* BUTTONS */
    .btn-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      color: white;
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    .levi {
      background: linear-gradient(45deg, #5865F2, #7289da);
      box-shadow: 0 0 10px #5865F2;
    }

    .discord {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
      box-shadow: 0 0 10px #2ecc71;
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: rgba(0,0,0,0.4);
      font-size: 13px;
    }

    /* CANVAS */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        width: 100%;
        justify-content: space-around;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="title">🎮 Gaming Community</div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="events.html">Events</a>
    <a href="staff.html">Staff</a>
    <a href="rules.html">Rules</a>
  </nav>
</header>

<canvas id="canvas"></canvas>

<h1>Welcome Gamer 🎮</h1>

<div class="btn-container">
  <button class="btn levi" onclick="goPage('form.html')">Levi Hunt</button>
  <a href="https://discord.gg/exH5gwGP3U" target="_blank">
    <button class="btn discord">Join Discord</button>
  </a>
</div>

<footer>
  © 2026 EzGamer | All Rights Reserved
</footer>

<script>
  window.onload = () => {
    document.body.classList.add("show");
  }

  function goPage(page){
    document.body.classList.remove("show");
    setTimeout(()=>{
      window.location.href = page;
    }, 300);
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  const particles = [];
  for(let i = 0; i < 80; i++){
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 1,
      dx: (Math.random() - 0.5) * 0.5,
      dy: (Math.random() - 0.5) * 0.5
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
    });
    requestAnimationFrame(animate);
  }

  animate();
  window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
